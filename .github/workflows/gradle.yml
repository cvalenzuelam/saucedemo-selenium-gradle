name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Tests
      # Agregamos --info para ver los fallos detallados en la consola de GitHub
      run: ./gradlew test --continue --info

    - name: Upload Test Report
      if: always() # This ensures the report is uploaded even if the tests fail
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: build/reports/tests/test/
