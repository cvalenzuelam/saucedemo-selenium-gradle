name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission and Fix line endings
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Run Tests
      # Usamos --no-daemon para evitar que el daemon muera o consuma memoria extra
      run: ./gradlew clean test --info --no-daemon -Djava.awt.headless=true

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: build/reports/tests/test/
